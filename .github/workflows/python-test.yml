name: Python tests

on:
  push:
    branches: [main]
    paths:
      - "python/**"
      - "models/**"
      - "data/**"
      - ".github/workflows/python-test.yml"
  pull_request:
    paths:
      - "python/**"
      - "models/**"
      - "data/**"
      - ".github/workflows/python-test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps for cairosvg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libpango-1.0-0 libpangocairo-1.0-0

      - name: Install system deps for cairosvg (macOS)
        if: runner.os == 'macOS'
        run: brew install cairo pango

      - name: Sync data into _data
        run: python python/scripts/sync_data.py

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e python/[dev]

      - name: Ruff
        run: ruff check python/

      - name: Mypy
        run: mypy --config-file python/pyproject.toml python/src/venn_diagram_lab/

      - name: Pytest
        run: pytest python/tests/ -v
