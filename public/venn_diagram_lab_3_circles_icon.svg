<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Venn Diagram Lab three-circle icon</title>
  <desc id="desc">A clean three-circle Venn diagram icon with translucent blue, orange, and green circles.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <circle cx="202" cy="292" r="132" fill="#1E88E5" fill-opacity="0.72" stroke="#0D47A1" stroke-opacity="0.35" stroke-width="3"/>
    <circle cx="310" cy="292" r="132" fill="#43A047" fill-opacity="0.72" stroke="#1B5E20" stroke-opacity="0.35" stroke-width="3"/>
    <circle cx="256" cy="198" r="132" fill="#FB8C00" fill-opacity="0.72" stroke="#E65100" stroke-opacity="0.35" stroke-width="3"/>
  </g>
</svg>
